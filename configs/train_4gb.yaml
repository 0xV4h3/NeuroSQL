model_name: google/flan-t5-small
dataset_dir: data/t5_sql_dataset
output_dir: models/t5_sql_finetuned
final_export_dir: neuroscql/model_weights

max_input_length: 256
max_target_length: 128

num_train_epochs: 3
learning_rate: 2e-4

train_batch_size: 1
eval_batch_size: 1
grad_accum_steps: 16

save_steps: 200
eval_steps: 400
logging_steps: 20
save_total_limit: 3

seed: 42
resume: auto